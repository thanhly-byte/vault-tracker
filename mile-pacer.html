<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7:30 Mile — Lap Pacer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --cinder: #7a2e1f;
    --track: #a63a24;
    --track-dark: #5e2417;
    --infield: #1f3a2e;
    --infield-dark: #16281f;
    --chalk: #f2ece1;
    --chalk-dim: #cfc4b2;
    --gold: #d9a441;
    --ahead: #6fae7c;
    --behind: #c1553f;
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at 50% -10%, #2a2420 0%, #17130f 60%, #0f0c09 100%);
    font-family: 'Oswald', sans-serif;
    color: var(--chalk);
    display:flex;
    justify-content:center;
    padding: 24px 16px 48px;
  }

  .wrap{ width:100%; max-width:480px; }

  header{ text-align:center; margin-bottom: 22px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }
  h1{
    margin: 6px 0 2px;
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .sub{ color: var(--chalk-dim); font-size: 14px; }

  .track-box{
    position:relative;
    background: var(--infield-dark);
    border-radius: 100px;
    padding: 34px 18px;
    margin: 20px 0 18px;
    border: 2px solid #000;
  }
  .oval{
    position:relative;
    height: 150px;
    border-radius: 100px;
    background: var(--track-dark);
    border: 14px solid var(--track);
    box-shadow: inset 0 0 0 2px rgba(242,236,225,0.25);
  }
  .oval::before{
    content:'';
    position:absolute;
    inset: 22px;
    background: var(--infield);
    border-radius: 100px;
  }
  .marker{
    position:absolute;
    width:16px; height:16px;
    border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 0 4px rgba(217,164,65,0.25), 0 2px 6px rgba(0,0,0,0.5);
    top: 50%;
    left: 6px;
    transform: translate(-50%,-50%);
    transition: all 0.4s ease;
  }
  .lap-label{
    position:absolute;
    font-family:'JetBrains Mono',monospace;
    font-size: 11px;
    color: var(--chalk-dim);
  }
  .ll-start{ top:-20px; left:6px; }
  .ll-1{ top:-20px; right:6px; }
  .ll-2{ bottom:-20px; right:6px; }
  .ll-3{ bottom:-20px; left:6px; }

  .modes{
    display:flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .mode-btn{
    flex:1;
    background: #201a15;
    border: 1px solid #3a2f26;
    border-radius: 12px;
    padding: 12px 8px;
    text-align:center;
    cursor:pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .mode-btn .icon{ font-size: 20px; display:block; margin-bottom: 4px; }
  .mode-btn .label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--chalk-dim);
  }
  .mode-btn.active{
    border-color: var(--gold);
    background: rgba(217,164,65,0.08);
  }
  .mode-btn.active .label{ color: var(--gold); }
  .mode-note{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--chalk-dim);
    text-align:center;
    margin: -10px 0 16px;
    min-height: 14px;
  }
  .mode-note.err{ color: var(--behind); }

  .sensitivity-row{
    background: #201a15;
    border: 1px solid #3a2f26;
    border-radius: 12px;
    padding: 14px 16px 12px;
    margin: -6px 0 18px;
  }
  .sensitivity-label{
    display:flex;
    justify-content: space-between;
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--chalk-dim);
    margin-bottom: 8px;
  }
  .sensitivity-label .val{ color: var(--gold); font-weight:600; }
  .sensitivity-row input[type="range"]{
    width: 100%;
    accent-color: var(--gold);
    height: 4px;
  }
  .sensitivity-hints{
    display:flex;
    justify-content: space-between;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--chalk-dim);
    opacity: 0.6;
    margin-top: 4px;
  }

  .timer-card{
    background: #201a15;
    border: 1px solid #3a2f26;
    border-radius: 18px;
    padding: 26px 20px 22px;
    text-align:center;
    margin-bottom: 18px;
  }
  .big-time{
    font-family:'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height:1;
  }
  .lap-status{
    margin-top: 8px;
    font-family:'JetBrains Mono', monospace;
    font-size: 14px;
    min-height: 20px;
  }
  .lap-status.ahead{ color: var(--ahead); }
  .lap-status.behind{ color: var(--behind); }

  .gps-row{
    display:flex;
    justify-content: center;
    gap: 22px;
    margin-top: 10px;
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--chalk-dim);
  }
  .gps-row .val{ color: var(--gold); font-weight:600; }

  .controls{
    display:flex;
    gap: 10px;
    margin-top: 20px;
  }
  button{
    flex:1;
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size: 15px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 14px 10px;
    border-radius: 10px;
    border: none;
    cursor:pointer;
    transition: transform 0.1s ease, opacity 0.2s ease;
  }
  button:active{ transform: scale(0.97); }
  .btn-start{ background: var(--gold); color: #1f180f; }
  .btn-lap{ background: var(--track); color: var(--chalk); }
  .btn-reset{ background: #3a2f26; color: var(--chalk-dim); flex: 0 0 auto; padding: 14px 18px; }
  button:disabled{ opacity: 0.35; cursor: default; }

  .splits{
    border: 1px solid #3a2f26;
    border-radius: 14px;
    overflow:hidden;
  }
  .split-row{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    padding: 12px 14px;
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    border-bottom: 1px solid #2a231c;
    align-items:center;
  }
  .split-row:last-child{ border-bottom:none; }
  .split-row.head{
    background:#241d16;
    color: var(--gold);
    font-size: 11px;
    letter-spacing:1px;
    text-transform:uppercase;
  }
  .split-row.done{ background: rgba(111,174,124,0.06); }
  .split-row .diff.ahead{ color: var(--ahead); }
  .split-row .diff.behind{ color: var(--behind); }
  .split-row .diff.pending{ color: var(--chalk-dim); opacity:0.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Runway to 15' — Track Session</div>
    <h1>7:30 Mile</h1>
    <div class="sub">Even splits · 1:52.5 per lap</div>
  </header>

  <div class="track-box">
    <div class="oval">
      <div class="marker" id="marker"></div>
      <div class="lap-label ll-start">START</div>
      <div class="lap-label ll-1">L1</div>
      <div class="lap-label ll-2">L2</div>
      <div class="lap-label ll-3">L3</div>
    </div>
  </div>

  <div class="modes">
    <div class="mode-btn" id="clapMode">
      <span class="icon">👏</span>
      <span class="label">Clap Lap</span>
    </div>
    <div class="mode-btn" id="gpsMode">
      <span class="icon">📍</span>
      <span class="label">GPS Auto</span>
    </div>
  </div>
  <div class="mode-note" id="modeNote"></div>

  <div class="sensitivity-row" id="sensitivityRow" style="display:none;">
    <div class="sensitivity-label">
      <span>Clap sensitivity</span>
      <span class="val" id="sensitivityVal">Medium</span>
    </div>
    <input type="range" id="sensitivitySlider" min="20" max="90" value="55" step="1">
    <div class="sensitivity-hints"><span>More sensitive</span><span>Less sensitive</span></div>
  </div>

  <div class="timer-card">
    <div class="big-time" id="display">0:00.0</div>
    <div class="lap-status" id="status"></div>
    <div class="gps-row" id="gpsRow" style="display:none;">
      <div>Pace <span class="val" id="gpsPace">—</span></div>
      <div>Predicted <span class="val" id="gpsPredicted">—</span></div>
    </div>
    <div class="controls">
      <button class="btn-start" id="startBtn">Start</button>
      <button class="btn-lap" id="lapBtn" disabled>Lap</button>
      <button class="btn-reset" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="splits" id="splitsTable"></div>
</div>

<script>
  const goals = [
    { lap: 1, cum: 112.5, label: '1:52.5' },
    { lap: 2, cum: 225.0, label: '3:45.0' },
    { lap: 3, cum: 337.5, label: '5:37.5' },
    { lap: 4, cum: 450.0, label: '7:30.0' },
  ];
  const LAP_METERS = 400;
  const MILE_METERS = 1609.34;

  let startTime = null;
  let elapsed = 0;
  let running = false;
  let rafId = null;
  let lapIndex = 0;
  const actualCum = [];

  let clapEnabled = false;
  let audioCtx = null, analyser = null, timeData = null, freqData = null, clapRafId = null;
  let lastClapTime = 0;
  let noiseFloor = 0.02;
  let spikeMultiplier = 2.6;      // how many times louder than ambient floor a spike must be
  let highRatioThreshold = 0.40;  // how much of the spike's energy must be high-frequency (percussive)
  let highBinStart = 0;
  const CLAP_COOLDOWN_MS = 700;

  let gpsEnabled = false;
  let watchId = null;
  let totalDistance = 0;
  let lastPos = null;
  let recentSpeeds = [];

  const display = document.getElementById('display');
  const status = document.getElementById('status');
  const marker = document.getElementById('marker');
  const startBtn = document.getElementById('startBtn');
  const lapBtn = document.getElementById('lapBtn');
  const resetBtn = document.getElementById('resetBtn');
  const splitsTable = document.getElementById('splitsTable');
  const clapModeBtn = document.getElementById('clapMode');
  const gpsModeBtn = document.getElementById('gpsMode');
  const modeNote = document.getElementById('modeNote');
  const gpsRow = document.getElementById('gpsRow');
  const gpsPaceEl = document.getElementById('gpsPace');
  const gpsPredictedEl = document.getElementById('gpsPredicted');
  const sensitivityRow = document.getElementById('sensitivityRow');
  const sensitivitySlider = document.getElementById('sensitivitySlider');
  const sensitivityVal = document.getElementById('sensitivityVal');

  function fmt(sec){
    const m = Math.floor(sec / 60);
    const s = sec - m*60;
    return m + ':' + s.toFixed(1).padStart(4,'0');
  }

  function note(msg, isErr){
    modeNote.textContent = msg;
    modeNote.className = 'mode-note' + (isErr ? ' err' : '');
  }

  function renderSplits(){
    let html = '<div class="split-row head"><div>Lap</div><div>Goal</div><div>Actual</div><div>Diff</div></div>';
    goals.forEach((g, i) => {
      const done = i < actualCum.length;
      const actual = done ? fmt(actualCum[i]) : '—';
      let diffHtml = '<span class="diff pending">—</span>';
      if (done){
        const diff = actualCum[i] - g.cum;
        const sign = diff <= 0 ? '−' : '+';
        const cls = diff <= 0 ? 'ahead' : 'behind';
        diffHtml = '<span class="diff ' + cls + '">' + sign + Math.abs(diff).toFixed(1) + 's</span>';
      }
      html += '<div class="split-row ' + (done ? 'done' : '') + '">' +
        '<div>Lap ' + g.lap + '</div>' +
        '<div>' + g.label + '</div>' +
        '<div>' + actual + '</div>' +
        '<div>' + diffHtml + '</div>' +
      '</div>';
    });
    splitsTable.innerHTML = html;
  }

  function updateMarker(){
    const w = document.querySelector('.oval').clientWidth;
    const lapProgress = lapIndex % 2 === 0 ? 8 : w - 8;
    marker.style.left = lapProgress + 'px';
  }

  function recordLap(){
    if (lapIndex >= goals.length || !running) return;
    actualCum.push(elapsed);
    lapIndex++;
    updateMarker();
    renderSplits();
    if (lapIndex >= goals.length){
      finish();
    }
  }

  function finish(){
    lapBtn.disabled = true;
    running = false;
    cancelAnimationFrame(rafId);
    startBtn.disabled = true;
    const finalDiff = elapsed - 450;
    status.textContent = finalDiff <= 0
      ? (Math.abs(finalDiff).toFixed(1) + 's under goal — nice.')
      : (finalDiff.toFixed(1) + 's over goal.');
    status.className = 'lap-status ' + (finalDiff <= 0 ? 'ahead' : 'behind');
    stopClapListening();
    stopGps();
  }

  function tick(){
    if (!running) return;
    elapsed = (performance.now() - startTime) / 1000;
    display.textContent = fmt(elapsed);

    if (lapIndex < goals.length){
      const goalCum = goals[lapIndex].cum;
      const diff = elapsed - goalCum;
      if (diff <= 0){
        status.textContent = Math.abs(diff).toFixed(1) + 's ahead of Lap ' + (lapIndex+1) + ' goal';
        status.className = 'lap-status ahead';
      } else {
        status.textContent = diff.toFixed(1) + 's behind Lap ' + (lapIndex+1) + ' goal';
        status.className = 'lap-status behind';
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  startBtn.addEventListener('click', () => {
    if (!running){
      startTime = performance.now() - elapsed*1000;
      running = true;
      startBtn.textContent = 'Pause';
      lapBtn.disabled = false;
      tick();
    } else {
      running = false;
      cancelAnimationFrame(rafId);
      startBtn.textContent = 'Resume';
    }
  });

  lapBtn.addEventListener('click', recordLap);

  resetBtn.addEventListener('click', () => {
    running = false;
    cancelAnimationFrame(rafId);
    elapsed = 0; lapIndex = 0; actualCum.length = 0;
    totalDistance = 0; lastPos = null; recentSpeeds = [];
    display.textContent = '0:00.0';
    status.textContent = '';
    status.className = 'lap-status';
    startBtn.textContent = 'Start';
    startBtn.disabled = false;
    lapBtn.disabled = true;
    marker.style.left = '8px';
    gpsPaceEl.textContent = '—';
    gpsPredictedEl.textContent = '—';
    renderSplits();
  });

  function startClapListening(){
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      note('Microphone not available on this device/browser.', true);
      clapEnabled = false;
      clapModeBtn.classList.remove('active');
      return;
    }
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);
        timeData = new Uint8Array(analyser.fftSize);
        freqData = new Uint8Array(analyser.frequencyBinCount);
        const binHz = audioCtx.sampleRate / analyser.fftSize;
        highBinStart = Math.floor(2000 / binHz); // ~2kHz+ = percussive/clap range
        note('Listening for claps — clap sharply to log a lap.');
        clapListenLoop();
      })
      .catch(() => {
        note('Microphone permission denied — clap lap disabled.', true);
        clapEnabled = false;
        clapModeBtn.classList.remove('active');
      });
  }

  function clapListenLoop(){
    if (!clapEnabled || !analyser) return;
    analyser.getByteTimeDomainData(timeData);
    analyser.getByteFrequencyData(freqData);

    // RMS loudness of this frame (0..~1)
    let sumSq = 0;
    for (let i = 0; i < timeData.length; i++){
      const v = (timeData[i] - 128) / 128;
      sumSq += v * v;
    }
    const rms = Math.sqrt(sumSq / timeData.length);

    // how much of the energy sits in the percussive/high-frequency range
    let totalEnergy = 0, highEnergy = 0;
    for (let i = 0; i < freqData.length; i++){
      totalEnergy += freqData[i];
      if (i >= highBinStart) highEnergy += freqData[i];
    }
    const highRatio = totalEnergy > 0 ? highEnergy / totalEnergy : 0;

    const now = performance.now();
    const isLoudSpike = rms > noiseFloor * spikeMultiplier && rms > 0.035;
    const isClapShaped = highRatio > highRatioThreshold;

    if (isLoudSpike && isClapShaped && now - lastClapTime > CLAP_COOLDOWN_MS){
      lastClapTime = now;
      flashClapDetected();
      if (running) recordLap();
    } else if (!isLoudSpike){
      // slowly adapt to ambient noise level (traffic, wind, breathing) so ongoing
      // background noise doesn't get mistaken for claps, without this ever falling
      // below what a real quiet room sounds like
      noiseFloor = noiseFloor * 0.97 + rms * 0.03;
    }

    clapRafId = requestAnimationFrame(clapListenLoop);
  }

  function flashClapDetected(){
    clapModeBtn.style.borderColor = 'var(--ahead)';
    setTimeout(() => {
      if (clapEnabled) clapModeBtn.style.borderColor = 'var(--gold)';
    }, 250);
  }

  function stopClapListening(){
    if (audioCtx){ audioCtx.close(); audioCtx = null; }
    if (clapRafId) cancelAnimationFrame(clapRafId);
  }

  clapModeBtn.addEventListener('click', () => {
    clapEnabled = !clapEnabled;
    clapModeBtn.classList.toggle('active', clapEnabled);
    sensitivityRow.style.display = clapEnabled ? 'block' : 'none';
    if (clapEnabled){
      startClapListening();
    } else {
      stopClapListening();
      note('');
    }
  });

  function sensitivityLabel(v){
    // slider range 20 (most sensitive) - 90 (least sensitive)
    if (v <= 35) return 'Very high';
    if (v <= 50) return 'High';
    if (v <= 65) return 'Medium';
    if (v <= 78) return 'Low';
    return 'Very low';
  }

  function applySensitivity(v){
    // lower v = easier to trigger (smaller jump needed, looser clap-shape requirement)
    // higher v = stricter on both loudness jump and how "clap-shaped" the spike must be
    spikeMultiplier = 1.8 + (v - 20) * (2.4 / 70);       // ~1.8x .. ~4.2x
    highRatioThreshold = 0.25 + (v - 20) * (0.30 / 70);  // ~0.25 .. ~0.55
  }

  sensitivitySlider.addEventListener('input', (e) => {
    const v = Number(e.target.value);
    applySensitivity(v);
    sensitivityVal.textContent = sensitivityLabel(v);
  });
  applySensitivity(Number(sensitivitySlider.value));
  sensitivityVal.textContent = sensitivityLabel(Number(sensitivitySlider.value));

  function haversine(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function startGps(){
    if (!navigator.geolocation){
      note('GPS not available on this device/browser.', true);
      gpsEnabled = false;
      gpsModeBtn.classList.remove('active');
      return;
    }
    gpsRow.style.display = 'flex';
    note('Acquiring GPS — auto-lap fires every 400m.');
    watchId = navigator.geolocation.watchPosition(onGpsUpdate, onGpsError, {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 8000
    });
  }

  function onGpsUpdate(pos){
    const latitude = pos.coords.latitude, longitude = pos.coords.longitude;
    const accuracy = pos.coords.accuracy, speed = pos.coords.speed;
    const now = performance.now();

    if (accuracy && accuracy > 25){
      return;
    }

    if (lastPos && running){
      const d = haversine(lastPos.lat, lastPos.lon, latitude, longitude);
      const dt = (now - lastPos.t) / 1000;
      const impliedSpeed = dt > 0 ? d / dt : 0;
      if (d > 0.5 && impliedSpeed < 8){
        totalDistance += d;
        recentSpeeds.push(impliedSpeed);
        if (recentSpeeds.length > 8) recentSpeeds.shift();
      }
    }
    lastPos = { lat: latitude, lon: longitude, t: now };

    const avgRecent = recentSpeeds.length ? recentSpeeds.reduce((a,b)=>a+b,0) / recentSpeeds.length : 0;
    const liveSpeed = (speed && speed > 0) ? speed : avgRecent;

    if (liveSpeed > 0.3){
      const mileSeconds = MILE_METERS / liveSpeed;
      gpsPaceEl.textContent = fmt(mileSeconds) + '/mi';
      if (running){
        const remaining = Math.max(MILE_METERS - totalDistance, 0);
        const remainingTime = remaining / liveSpeed;
        gpsPredictedEl.textContent = fmt(elapsed + remainingTime);
      }
    } else {
      gpsPaceEl.textContent = '—';
      gpsPredictedEl.textContent = '—';
    }

    if (running && Math.floor(totalDistance / LAP_METERS) > lapIndex && lapIndex < goals.length){
      recordLap();
    }
  }

  function onGpsError(){
    note('GPS signal lost or permission denied.', true);
  }

  function stopGps(){
    if (watchId !== null){
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
    }
  }

  gpsModeBtn.addEventListener('click', () => {
    gpsEnabled = !gpsEnabled;
    gpsModeBtn.classList.toggle('active', gpsEnabled);
    if (gpsEnabled){
      startGps();
    } else {
      stopGps();
      gpsRow.style.display = 'none';
      note('');
    }
  });

  renderSplits();
</script>
</body>
</html>
